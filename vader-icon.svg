<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#0d1117"/>

  <!-- Helmet top dome -->
  <rect x="10" y="3" width="12" height="1" fill="#1a1a2e"/>
  <rect x="8" y="4" width="16" height="1" fill="#1a1a2e"/>
  <rect x="7" y="5" width="18" height="1" fill="#1a1a2e"/>
  <rect x="6" y="6" width="20" height="1" fill="#16213e"/>
  <rect x="6" y="7" width="20" height="1" fill="#16213e"/>

  <!-- Helmet shine -->
  <rect x="11" y="4" width="3" height="1" fill="#2a2a4a"/>
  <rect x="9" y="5" width="2" height="1" fill="#2a2a4a"/>

  <!-- Eye strip -->
  <rect x="5" y="8" width="22" height="1" fill="#0f3460"/>
  <rect x="5" y="9" width="22" height="1" fill="#0f3460"/>

  <!-- Eyes -->
  <rect x="9" y="8" width="4" height="2" fill="#e94560"/>
  <rect x="19" y="8" width="4" height="2" fill="#e94560"/>

  <!-- Eye glow -->
  <rect x="10" y="8" width="2" height="1" fill="#ff6b6b"/>
  <rect x="20" y="8" width="2" height="1" fill="#ff6b6b"/>

  <!-- Nose bridge -->
  <rect x="6" y="10" width="20" height="1" fill="#16213e"/>
  <rect x="7" y="11" width="18" height="1" fill="#1a1a2e"/>
  <rect x="14" y="10" width="4" height="2" fill="#0f3460"/>

  <!-- Mouth grill -->
  <rect x="8" y="12" width="16" height="1" fill="#1a1a2e"/>
  <rect x="9" y="13" width="14" height="1" fill="#16213e"/>
  <rect x="10" y="14" width="12" height="1" fill="#1a1a2e"/>
  <rect x="11" y="15" width="10" height="1" fill="#16213e"/>

  <!-- Grill lines -->
  <rect x="10" y="12" width="1" height="4" fill="#0f3460"/>
  <rect x="13" y="12" width="1" height="4" fill="#0f3460"/>
  <rect x="16" y="12" width="1" height="4" fill="#0f3460"/>
  <rect x="19" y="12" width="1" height="4" fill="#0f3460"/>
  <rect x="21" y="12" width="1" height="3" fill="#0f3460"/>

  <!-- Chin -->
  <rect x="12" y="16" width="8" height="1" fill="#1a1a2e"/>
  <rect x="13" y="17" width="6" height="1" fill="#16213e"/>

  <!-- Neck / chest plate -->
  <rect x="10" y="18" width="12" height="1" fill="#16213e"/>
  <rect x="8" y="19" width="16" height="1" fill="#1a1a2e"/>
  <rect x="7" y="20" width="18" height="1" fill="#16213e"/>

  <!-- Chest buttons -->
  <rect x="13" y="21" width="2" height="2" fill="#e94560"/>
  <rect x="17" y="21" width="2" height="2" fill="#0f3460"/>
  <rect x="13" y="24" width="2" height="2" fill="#4ecca3"/>
  <rect x="17" y="24" width="2" height="2" fill="#e94560"/>

  <!-- Chest plate body -->
  <rect x="7" y="21" width="18" height="1" fill="#1a1a2e"/>
  <rect x="7" y="22" width="18" height="1" fill="#1a1a2e"/>
  <rect x="7" y="23" width="18" height="1" fill="#16213e"/>
  <rect x="8" y="24" width="16" height="1" fill="#1a1a2e"/>
  <rect x="8" y="25" width="16" height="1" fill="#1a1a2e"/>
  <rect x="9" y="26" width="14" height="1" fill="#16213e"/>
  <rect x="10" y="27" width="12" height="1" fill="#1a1a2e"/>
  <rect x="11" y="28" width="10" height="1" fill="#16213e"/>
</svg>
